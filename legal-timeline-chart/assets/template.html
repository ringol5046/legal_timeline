<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>__CASE_CAPTION__ — Timeline</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  :root {
    --bg: #fafaf7; --ink: #1a1a1a; --muted: #6b6b6b; --rule: #d8d4cc;
    --dispute: #c53030;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: ui-sans-serif, -apple-system, "SF Pro Text", system-ui, sans-serif; background: var(--bg); color: var(--ink); padding: 24px 32px; }
  header { max-width: 1280px; margin-bottom: 16px; }
  h1 { font-size: 20px; font-weight: 600; margin: 0 0 4px 0; letter-spacing: -0.01em; }
  .subtitle { font-size: 13px; color: var(--muted); margin: 0 0 16px 0; }
  .controls { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; padding: 10px 14px; background: white; border: 1px solid var(--rule); border-radius: 6px; font-size: 12px; }
  .controls label { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
  .controls .divider { width: 1px; height: 18px; background: var(--rule); }
  .controls .legend-swatch { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  #chart-wrap { max-width: 1280px; background: white; border: 1px solid var(--rule); border-radius: 6px; overflow: auto; margin-top: 12px; }
  svg { display: block; }
  .axis text { font-size: 11px; fill: var(--muted); }
  .leader { stroke: var(--rule); stroke-width: 0.6px; }
  .axis path, .axis line { stroke: var(--rule); }
  .lane-bg { fill: white; }
  .lane-bg.alt { fill: #f5f3ee; }
  .lane-label { font-size: 12px; font-weight: 600; fill: var(--ink); }
  .lane-sub { font-size: 10px; fill: var(--muted); }
  .event circle { stroke-width: 2px; transition: r 120ms ease, stroke-width 120ms ease; cursor: pointer; }
  .event:hover circle { r: 9; stroke-width: 3px; }
  .event-label { font-size: 9.5px; fill: var(--ink); pointer-events: none; }
  .event-date { font-size: 8.5px; fill: var(--muted); pointer-events: none; }
  .connector { fill: none; stroke: var(--muted); stroke-width: 1.2px; stroke-dasharray: 3 3; opacity: 0.55; }
  .connector.causal { stroke-dasharray: none; opacity: 0.75; }
  .connector.tolls { stroke: #d69e2e; stroke-dasharray: 6 2; opacity: 0.85; stroke-width: 1.5px; }
  .connector.supersedes { stroke: #718096; stroke-dasharray: 1 4; opacity: 0.7; }
  .dispute-bracket { stroke: var(--dispute); stroke-width: 1.2px; fill: none; stroke-dasharray: 3 2; opacity: 0.75; }
  .dispute-marker { font-size: 14px; fill: var(--dispute); font-weight: 600; }
  .dispute-label { font-size: 10px; fill: var(--dispute); font-style: italic; }
  .cluster { cursor: pointer; }
  .cluster:hover .cluster-bg { stroke-width: 3px; }
  .cluster-bg { stroke: white; stroke-width: 2px; transition: stroke-width 120ms ease; }
  .cluster-count { font-size: 11px; font-weight: 700; fill: white; pointer-events: none; }
  .cluster-month { font-size: 9px; fill: var(--muted); pointer-events: none; }
  .tooltip { position: absolute; pointer-events: none; background: #1a1a1a; color: white; padding: 8px 10px; border-radius: 4px; font-size: 11.5px; line-height: 1.4; max-width: 320px; opacity: 0; transition: opacity 120ms ease; box-shadow: 0 4px 16px rgba(0,0,0,0.2); z-index: 10; }
  .tooltip strong { color: #ffe066; }
  .tooltip .meta { color: #b8b8b8; font-size: 10px; margin-top: 4px; }
  .tooltip .src { color: #9ad0ff; font-size: 10px; margin-top: 4px; font-style: italic; }
  footer { max-width: 1280px; margin-top: 12px; font-size: 11px; color: var(--muted); }
  .style-pill { display: inline-block; padding: 2px 8px; font-size: 10.5px; font-weight: 500; background: #edf2f7; color: #2d3748; border-radius: 10px; vertical-align: middle; margin-left: 8px; letter-spacing: 0.02em; }
  .warnings { max-width: 1280px; margin-top: 12px; padding: 10px 14px; background: #fffaf0; border: 1px solid #f6e05e; border-left: 3px solid #d69e2e; border-radius: 4px; font-size: 12px; color: #744210; }
  .warnings ul { margin: 4px 0 0 0; padding-left: 18px; }
  .warnings li { margin: 2px 0; }
  .warnings strong { color: #5c2d00; }
</style>
</head>
<body>
<header>
  <h1>__CASE_CAPTION__<span class="style-pill">__CHART_STYLE__</span> <span style="color:var(--muted);font-weight:400">— __CASE_COURT__ · __CASE_DOCKET__</span></h1>
  <p class="subtitle">__CASE_SUMMARY__</p>
</header>

__WARNINGS_HTML__

<div class="controls" id="controls"></div>
<div id="chart-wrap"></div>
<div class="tooltip" id="tooltip"></div>

<footer>Solid dots = undisputed. Hollow with red bracket = disputed. Gray dashed arrow = response. Gray solid = causal. Gold dashed = tolling. Hover events for citations.</footer>

<script>
const DATA = /* __TIMELINE_DATA__ */;

// Build legend dynamically based on data
const controls = document.getElementById("controls");
function legendHTML() {
  const swatches = DATA.lanes.map(l => `<span><span class="legend-swatch" style="background:${l.color || '#999'}"></span> ${l.label}${l.sub ? ' (' + l.sub + ')' : ''}</span>`).join("");
  return `
    <label><input type="checkbox" id="show-disputed" checked /> Show disputed events</label>
    <label><input type="checkbox" id="show-response" checked /> Response arrows</label>
    <label><input type="checkbox" id="show-causal" checked /> Causal arrows</label>
    <label><input type="checkbox" id="show-tolls" checked /> Tolling arrows</label>
    <div class="divider"></div>
    ${swatches}
    <div class="divider"></div>
    <span><span class="legend-swatch" style="background:white;border:2px solid var(--dispute)"></span> Disputed</span>
  `;
}
controls.innerHTML = legendHTML();

// ---- Fixed-width month-column grid (one column per calendar month) ----
const COL_WIDTH = 28;       // pixels per month column
const margin = { top: 95, right: 40, bottom: 40, left: 170 };
const laneHeight = 340;     // tall enough for ±140 slot offset plus expanded clusters and labels
const lanes = DATA.lanes.slice().sort((a,b) => (a.order||0) - (b.order||0));

const parseDate = d3.timeParse("%Y-%m-%d");
const events = DATA.events.map(e => ({
  ...e,
  _d: parseDate(e.date || (e.date_range && e.date_range[0]))
})).filter(e => e._d);

// Derive the inclusive month range from case.date_range
const [start, end] = DATA.case.date_range;
const startMonth = d3.timeMonth.floor(parseDate(start));
const endMonth   = d3.timeMonth.offset(d3.timeMonth.floor(parseDate(end)), 1);
const months     = d3.timeMonth.range(startMonth, endMonth);  // array of Date, one per month
const monthIndex = new Map(months.map((m, i) => [+m, i]));

// xScale: maps any date to the center of its month column
function xScale(date) {
  const t = +d3.timeMonth.floor(date);
  let idx = monthIndex.get(t);
  if (idx === undefined) {
    idx = t < +months[0] ? 0 : months.length - 1;
  }
  return idx * COL_WIDTH + COL_WIDTH / 2;
}

const innerW = months.length * COL_WIDTH;
const width  = innerW + margin.left + margin.right;
const height = lanes.length * laneHeight + margin.top + margin.bottom;

const svg = d3.select("#chart-wrap").append("svg")
  .attr("viewBox", `0 0 ${width} ${height}`)
  .attr("width", width)
  .attr("height", height);

const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

// Lanes
const laneG = g.selectAll(".lane").data(lanes).join("g")
  .attr("class", "lane")
  .attr("transform", (d, i) => `translate(0, ${i * laneHeight})`);
laneG.append("rect").attr("class", (d,i) => "lane-bg" + (i%2===1 ? " alt" : ""))
  .attr("x", -margin.left + 10).attr("width", innerW + margin.left + margin.right - 20).attr("height", laneHeight - 4);
laneG.append("text").attr("class","lane-label").attr("x", -margin.left + 22).attr("y", laneHeight/2 - 4).text(d => d.label);
laneG.append("text").attr("class","lane-sub").attr("x", -margin.left + 22).attr("y", laneHeight/2 + 12).text(d => d.sub || "");
laneG.append("rect").attr("x", -margin.left + 14).attr("y", laneHeight/2 - 14).attr("width", 3).attr("height", 28).attr("fill", d => d.color || "#999");

// ---- Column gridlines: light per-month, darker per-year ----
g.selectAll(".grid-month").data(months)
  .join("line").attr("class","grid-month")
  .attr("x1", d => xScale(d) + COL_WIDTH/2).attr("x2", d => xScale(d) + COL_WIDTH/2)
  .attr("y1", 0).attr("y2", lanes.length * laneHeight)
  .attr("stroke", "var(--rule)").attr("opacity", 0.18);

const yearStarts = months.filter(m => m.getMonth() === 0);
g.selectAll(".grid-year").data(yearStarts)
  .join("line").attr("class","grid-year")
  .attr("x1", d => xScale(d) - COL_WIDTH/2).attr("x2", d => xScale(d) - COL_WIDTH/2)
  .attr("y1", 0).attr("y2", lanes.length * laneHeight)
  .attr("stroke", "var(--rule)").attr("opacity", 0.6);

// ---- Axis: prominent year labels, quieter quarterly month labels ----
const axisG = g.append("g").attr("class","axis");
axisG.append("line").attr("x1", 0).attr("x2", innerW).attr("y1", 0).attr("y2", 0)
  .attr("stroke", "var(--rule)");

yearStarts.forEach(d => {
  axisG.append("text").attr("class","year-label")
    .attr("x", xScale(d)).attr("y", -10).attr("text-anchor","middle")
    .style("font-size","12px").style("font-weight","600").style("fill","var(--ink)")
    .text(d.getFullYear());
});

months.filter(m => m.getMonth() % 3 === 0 && m.getMonth() !== 0).forEach(d => {
  axisG.append("text").attr("class","quarter-label")
    .attr("x", xScale(d)).attr("y", -10).attr("text-anchor","middle")
    .style("font-size","9.5px").style("fill","var(--muted)")
    .text(d3.timeFormat("%b")(d));
});

svg.append("defs").selectAll("marker")
  .data(["response","causal","tolls","supersedes"]).join("marker")
  .attr("id", d => `arrow-${d}`).attr("viewBox","0 -5 10 10").attr("refX", 8).attr("refY", 0)
  .attr("markerWidth", 6).attr("markerHeight", 6).attr("orient","auto")
  .append("path").attr("d","M0,-4L8,0L0,4")
  .attr("fill", d => d === "tolls" ? "#d69e2e" : (d === "causal" ? "#6b6b6b" : "#888"));

function laneY(id) { const i = lanes.findIndex(l => l.id === id); return i * laneHeight + laneHeight/2; }
function eventById(id) { return events.find(e => e.id === id); }
function sourceById(id) { return (DATA.sources || []).find(s => s.id === id); }

const connectorG = g.append("g").attr("class","connectors");
function renderConnectors() {
  const flags = { response: document.getElementById("show-response").checked,
                  causal: document.getElementById("show-causal").checked,
                  tolls: document.getElementById("show-tolls").checked,
                  supersedes: true, contradicts: true, references: true };
  connectorG.selectAll("*").remove();
  (DATA.relationships || []).forEach(c => {
    if (!flags[c.type]) return;
    const a = eventById(c.from_event_id), b = eventById(c.to_event_id);
    if (!a || !b) return;
    if (!isEventVisible(a) || !isEventVisible(b)) return;  // only draw between visible events
    const x1=xScale(a._d);
    const x2=xScale(b._d);
    const y1=laneY(a.lane_id) + (yJit.get(a.id) || 0);
    const y2=laneY(b.lane_id) + (yJit.get(b.id) || 0);
    const mx=(x1+x2)/2;
    connectorG.append("path").attr("d", `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`)
      .attr("class", `connector ${c.type}`).attr("marker-end", `url(#arrow-${c.type === 'tolls' ? 'tolls' : (c.type === 'causal' ? 'causal' : 'response')})`);
  });
}

const disputeG = g.append("g").attr("class","disputes");
function renderDisputes() {
  const show = document.getElementById("show-disputed").checked;
  disputeG.selectAll("*").remove();
  if (!show) return;
  // Arc top sits in the top margin, above the time axis (which is at y=0 within g)
  const arcTopY = -32;
  (DATA.disputes || []).forEach((d, i) => {
    const evs = d.versions.map(v => eventById(v.event_id)).filter(Boolean);
    if (evs.length < 2) return;
    if (!evs.every(isEventVisible)) return;  // only draw arc when both versions are visible
    evs.sort((a,b) => a._d - b._d);
    const [a, b] = evs;
    const x1 = xScale(a._d);
    const x2 = xScale(b._d);
    const y1 = laneY(a.lane_id) + (yJit.get(a.id) || 0);
    const y2 = laneY(b.lane_id) + (yJit.get(b.id) || 0);
    const midX = (x1 + x2) / 2;
    // Stack multiple disputes so their arc labels don't collide
    const tierTop = arcTopY - i * 22;
    // Smooth arch: cubic Bezier from each dot up into the margin, peaking near tierTop
    disputeG.append("path").attr("class","dispute-bracket")
      .attr("d", `M${x1},${y1 - 10} C${x1},${tierTop} ${x2},${tierTop} ${x2},${y2 - 10}`);
    // Diamond marker at the arc peak
    disputeG.append("text").attr("class","dispute-marker")
      .attr("x", midX).attr("y", tierTop - 6).attr("text-anchor","middle")
      .text("◆");
    // Label sits above the marker, wraps to two lines if long
    const subject = d.subject || "disputed";
    const labelText = `disputed: ${subject}`;
    const maxLen = 70;
    const label = disputeG.append("text").attr("class","dispute-label")
      .attr("x", midX).attr("y", tierTop - 18).attr("text-anchor","middle");
    if (labelText.length <= maxLen) {
      label.text(labelText);
    } else {
      const cut = labelText.lastIndexOf(" ", maxLen);
      const split = cut > maxLen / 2 ? cut : maxLen;
      label.append("tspan").attr("x", midX).attr("dy", 0).text(labelText.slice(0, split));
      label.append("tspan").attr("x", midX).attr("dy", 12).text(labelText.slice(split).trim());
      // Push the marker down a bit when there are two lines so it doesn't crash into them
      disputeG.selectAll(".dispute-marker").filter((_, idx, nodes) => nodes[idx].previousSibling === label.node().previousSibling)
        .attr("y", tierTop - 4);
    }
  });
}

// ---- Dot-position staggering: each dot offset vertically so labels don't overlap horizontally ----
const DOT_SLOTS_Y = [0, 80, -80, 140, -140]; // y-offsets from lane centerline (leaves room for expanded clusters)
// Labels are always rendered directly below each dot at a fixed offset
const LABEL_SLOTS = [
  { y_label: 22,  y_date: 32, dir: 1 },   // fixed: 22px below dot
];
const MIN_X_GAP = 150;
const MAX_LABEL_CHARS = 22;
const STACK_STEP = 52;       // px between stacked event rows in an expanded cluster (dot + label + date + buffer)
let slotIdx  = new Map();    // event.id -> slot index (or -1 to suppress label)
let xOff     = new Map();    // (unused, kept for compat)
let yJit     = new Map();    // event.id -> y pixel offset for stacking
let forceSlot = new Map();   // event.id -> override slot index
let clusters = [];           // array of {id, key, events, lane_id, x, size}
let eventToCluster = new Map();  // event.id -> {cluster, index}
let expandedSet = new Set(); // ids of currently expanded multi-event clusters

function monthKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}`;
}

function buildClusters(visible) {
  clusters = [];
  eventToCluster = new Map();
  const groups = d3.group(visible, e => `${e.lane_id}|${monthKey(e._d)}`);
  let cid = 0;
  groups.forEach((evs, key) => {
    const sortedEvs = evs.slice().sort((a,b) => a._d - b._d);
    const meanX = d3.mean(sortedEvs, e => xScale(e._d));
    const cluster = {
      id: `cluster_${cid++}`,
      key,
      events: sortedEvs,
      lane_id: sortedEvs[0].lane_id,
      x: meanX,
      size: sortedEvs.length,
      month: monthKey(sortedEvs[0]._d),
    };
    clusters.push(cluster);
    sortedEvs.forEach((e, i) => eventToCluster.set(e.id, { cluster, index: i }));
  });
}

function isEventVisible(ev) {
  const info = eventToCluster.get(ev.id);
  if (!info) return true;
  if (info.cluster.size === 1) return true;
  return expandedSet.has(info.cluster.id);
}

function isClusterCollapsed(c) {
  return c.size > 1 && !expandedSet.has(c.id);
}

function recomputeLayout(visible) {
  slotIdx   = new Map();
  xOff      = new Map();
  yJit      = new Map();
  forceSlot = new Map();

  buildClusters(visible);

  // ---- Per-lane chronological dot-slot assignment ----
  // Each cluster gets a y-offset based on x-proximity to neighbors in the same lane.
  // Adjacent columns are assigned different slots so labels (always below dot) don't overlap.
  const clustersByLane = d3.group(clusters, c => c.lane_id);
  clustersByLane.forEach(laneClusters => {
    const sorted = laneClusters.slice().sort((a,b) => a.x - b.x);
    const lastX = DOT_SLOTS_Y.map(() => -Infinity);
    sorted.forEach(cluster => {
      const x = cluster.x;
      let chosen = 0;
      for (let i = 0; i < DOT_SLOTS_Y.length; i++) {
        if (x - lastX[i] > MIN_X_GAP) { chosen = i; break; }
      }
      lastX[chosen] = x;
      const baseY = DOT_SLOTS_Y[chosen];
      cluster.dotSlotY = baseY;     // remember for cluster-marker positioning
      if (cluster.size === 1) {
        yJit.set(cluster.events[0].id, baseY);
      } else {
        // Multi-event clusters: stack vertically around their slot's base y
        const center = (cluster.size - 1) / 2;
        cluster.events.forEach((ev, i) => yJit.set(ev.id, baseY + (i - center) * STACK_STEP));
      }
    });
  });

  // Labels always render at LABEL_SLOTS[0] (fixed offset below each dot). Force every event to slot 0,
  // except for expanded multi-event clusters where middle events have no inline label.
  const visibleEvts = visible.filter(isEventVisible);
  visibleEvts.forEach(ev => {
    const info = eventToCluster.get(ev.id);
    if (info && info.cluster.size > 1) {
      const i = info.index, n = info.cluster.size;
      if (i === 0)            slotIdx.set(ev.id, 0);   // top of stack: label below
      else if (i === n - 1)   slotIdx.set(ev.id, 0);   // bottom of stack: label below
      else                    slotIdx.set(ev.id, -1);  // middle of stack: hover for info
    } else {
      slotIdx.set(ev.id, 0);
    }
  });
}

// ---- Cluster expansion logic ----
function neighborsOf(clusterId) {
  // Return set of cluster IDs connected to this cluster via relationships or disputes (1 hop)
  const result = new Set([clusterId]);
  const cluster = clusters.find(c => c.id === clusterId);
  if (!cluster) return result;
  const evIds = new Set(cluster.events.map(e => e.id));
  (DATA.relationships || []).forEach(r => {
    let otherEvId = null;
    if (evIds.has(r.from_event_id)) otherEvId = r.to_event_id;
    else if (evIds.has(r.to_event_id)) otherEvId = r.from_event_id;
    if (otherEvId) {
      const info = eventToCluster.get(otherEvId);
      if (info && info.cluster.size > 1) result.add(info.cluster.id);
    }
  });
  (DATA.disputes || []).forEach(d => {
    const versionIds = d.versions.map(v => v.event_id);
    if (versionIds.some(id => evIds.has(id))) {
      versionIds.forEach(id => {
        const info = eventToCluster.get(id);
        if (info && info.cluster.size > 1) result.add(info.cluster.id);
      });
    }
  });
  return result;
}

let collapseTimer = null;
function scheduleCollapse() {
  if (collapseTimer) clearTimeout(collapseTimer);
  collapseTimer = setTimeout(() => {
    expandedSet = new Set();
    rerenderAll();
    collapseTimer = null;
  }, 280);
}
function cancelCollapse() {
  if (collapseTimer) { clearTimeout(collapseTimer); collapseTimer = null; }
}
function expandCluster(clusterId) {
  cancelCollapse();
  expandedSet = neighborsOf(clusterId);
  rerenderAll();
}
function rerenderAll() {
  renderEvents();
  renderDisputes();
  renderConnectors();
}

function truncateLabel(s) {
  if (!s) return "";
  return s.length > MAX_LABEL_CHARS ? s.slice(0, MAX_LABEL_CHARS - 1) + "…" : s;
}

const tooltip = d3.select("#tooltip");
const leaderG = g.append("g").attr("class","leaders");
const eventG = g.append("g").attr("class","events");
const clusterG = g.append("g").attr("class","clusters");

function renderEvents() {
  const showD = document.getElementById("show-disputed").checked;
  const visible = events.filter(e => showD || !e.disputed);
  recomputeLayout(visible);

  // ---- Render cluster markers for collapsed multi-event clusters ----
  const collapsedClusters = clusters.filter(isClusterCollapsed);
  const clSel = clusterG.selectAll(".cluster").data(collapsedClusters, c => c.id);
  clSel.exit().remove();
  const clEnter = clSel.enter().append("g").attr("class","cluster");
  clEnter.append("circle").attr("class","cluster-bg");
  clEnter.append("text").attr("class","cluster-count");
  clEnter.append("text").attr("class","cluster-month");
  const clAll = clEnter.merge(clSel)
    .attr("transform", c => `translate(${c.x}, ${laneY(c.lane_id) + (c.dotSlotY || 0)})`)
    .on("mouseenter", function(_, c) { expandCluster(c.id); })
    .on("mouseleave", function() { scheduleCollapse(); })
    .on("click", function(_, c) { expandCluster(c.id); });
  clAll.select(".cluster-bg")
    .attr("r", 12)
    .attr("fill", c => lanes.find(l => l.id === c.lane_id)?.color || "#999");
  clAll.select(".cluster-count")
    .attr("y", 4).attr("text-anchor","middle")
    .text(c => c.size);
  clAll.select(".cluster-month")
    .attr("y", 28).attr("text-anchor","middle")
    .text(c => {
      const d = c.events[0]._d;
      return d3.timeFormat("%b %Y")(d);
    });

  // ---- Render individual events: single-event clusters + members of expanded multi-event clusters ----
  const visibleIndividuals = visible.filter(isEventVisible);

  // Helper: an event is "labeled" only when it got a real slot (>=0)
  const hasLabel = d => slotIdx.get(d.id) >= 0;
  const slotOf = d => LABEL_SLOTS[slotIdx.get(d.id)];

  // Leader lines (drawn first so they sit below dots). Only for far-positioned labels.
  const dotY = d => laneY(d.lane_id) + (yJit.get(d.id) || 0);
  const leaders = leaderG.selectAll(".leader").data(visibleIndividuals.filter(hasLabel), d => d.id);
  leaders.exit().remove();
  leaders.enter().append("line").attr("class","leader").merge(leaders)
    .attr("x1", d => xScale(d._d))
    .attr("x2", d => xScale(d._d))
    .attr("y1", d => dotY(d) + (slotOf(d).dir > 0 ? 6 : -6))
    .attr("y2", d => dotY(d) + slotOf(d).y_label - (slotOf(d).dir > 0 ? 6 : -6))
    .attr("opacity", d => Math.abs(slotOf(d).y_label) > 30 ? 0.65 : 0);

  const sel = eventG.selectAll(".event").data(visibleIndividuals, d => d.id);
  sel.exit().remove();
  const enter = sel.enter().append("g").attr("class","event");
  enter.append("circle"); enter.append("text").attr("class","event-label"); enter.append("text").attr("class","event-date");
  const all = enter.merge(sel);
  all.attr("transform", d => `translate(${xScale(d._d)}, ${dotY(d)})`);
  all.select("circle").attr("r", 5)
    .attr("fill", d => d.disputed ? "white" : (lanes.find(l=>l.id===d.lane_id)?.color || "#999"))
    .attr("stroke", d => d.disputed ? "var(--dispute)" : (lanes.find(l=>l.id===d.lane_id)?.color || "#999"))
    .attr("stroke-dasharray", d => d.disputed ? "2 2" : null);

  all.select(".event-label").attr("x",0)
    .attr("y", d => hasLabel(d) ? slotOf(d).y_label : 0)
    .attr("text-anchor","middle")
    .style("display", d => hasLabel(d) ? null : "none")
    .text(d => truncateLabel(d.label));

  all.select(".event-date").attr("x",0)
    .attr("y", d => hasLabel(d) ? slotOf(d).y_date : 0)
    .attr("text-anchor","middle")
    .style("display", d => hasLabel(d) ? null : "none")
    .text(d => d3.timeFormat("%b %d, %Y")(d._d) + (d.date_certainty && d.date_certainty !== "exact" ? " (~)" : ""));
  all.on("mouseenter", function(event, d) {
    // Keep expansion alive while hovering an event inside an expanded cluster
    const info = eventToCluster.get(d.id);
    if (info && info.cluster.size > 1) cancelCollapse();
    const lane = lanes.find(l => l.id === d.lane_id);
    const srcs = (d.source_ids || []).map(sid => sourceById(sid)).filter(Boolean);
    const srcHTML = srcs.length ? `<div class="src">${srcs.map(s => s.citation).join(" · ")}</div>` : "";
    const sig = d.jurisdictional_significance ? `<div class="meta" style="color:#ffb59a">⚖ ${d.jurisdictional_significance}</div>` : "";
    tooltip.style("opacity",1).html(`<strong>${d.label}</strong>
      <div>${d.detail || ""}</div>
      <div class="meta">${lane?.label || d.lane_id} · ${d3.timeFormat("%B %d, %Y")(d._d)}${d.disputed ? " · <span style='color:#ff8a8a'>DISPUTED</span>" : ""}</div>
      ${sig}${srcHTML}`);
  }).on("mousemove", function(event) {
    tooltip.style("left",(event.pageX+14)+"px").style("top",(event.pageY+14)+"px");
  }).on("mouseleave", function(_, d) {
    tooltip.style("opacity",0);
    const info = eventToCluster.get(d.id);
    if (info && info.cluster.size > 1) scheduleCollapse();
  });
}

["show-disputed","show-response","show-causal","show-tolls"].forEach(id => {
  document.getElementById(id).addEventListener("change", () => { renderEvents(); renderDisputes(); renderConnectors(); });
});
renderEvents(); renderDisputes(); renderConnectors();
</script>
</body>
</html>
