<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Litigation Timeline — Centered Axis</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  :root {
    --bg: #fafaf7;
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --rule: #d8d4cc;
    --axis: #c98826;          /* thin amber line */
    --year-fill: #c98826;
    --month-fill: #8a6420;
    --smith: #d94e2a;
    --smith-dark: #b04323;
    --jones: #8a2c1e;
    --evergreen: #3a3a3a;
    --pt: #ed8a3a;
    --flag: #3a3a3a;
    --stem: #b3a99a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: ui-sans-serif, -apple-system, "SF Pro Text", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding: 24px 32px;
  }
  header { max-width: 1800px; margin: 0 auto 12px auto; }
  h1 {
    font-size: 48px;
    font-weight: 700;
    margin: 0 0 8px 0;
    text-align: center;
    letter-spacing: -0.01em;
  }
  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin: 0 auto 14px auto;
    text-align: center;
    max-width: 900px;
  }
  #chart-wrap {
    max-width: 1800px;
    margin: 0 auto;
    background: white;
    border: 1px solid var(--rule);
    border-radius: 8px;
    overflow: auto;
    padding: 8px;
  }
  svg { display: block; margin: 0 auto; }

  .axis-line { stroke: var(--axis); stroke-width: 2.5px; }
  .year-label {
    font-size: 22px;
    font-weight: 700;
    fill: var(--year-fill);
    dominant-baseline: middle;
    letter-spacing: 0.04em;
  }
  .month-label {
    font-size: 11.5px;
    font-weight: 600;
    fill: var(--month-fill);
    text-anchor: middle;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .month-tick { stroke: var(--axis); stroke-width: 1px; opacity: 0.55; }
  .event-dot { stroke: white; stroke-width: 2px; }
  .event-stem { stroke: var(--stem); stroke-width: 1px; }
  .event-date {
    font-size: 12px;
    font-weight: 700;
    fill: var(--smith-dark);
    text-anchor: middle;
  }
  .event-date.flag { fill: var(--ink); }
  .event-label {
    font-size: 12px;
    fill: var(--ink);
    text-anchor: middle;
  }
  .event-label.italic {
    font-style: italic;
    font-weight: 600;
    fill: #888;
    font-size: 12px;
  }
  .event-group { cursor: pointer; }
  .event-group:hover .event-shape { filter: brightness(1.1); }
  .tooltip {
    position: absolute;
    pointer-events: none;
    background: #1a1a1a;
    color: white;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 11.5px;
    line-height: 1.45;
    max-width: 280px;
    opacity: 0;
    transition: opacity 120ms ease;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    z-index: 10;
  }
  .tooltip strong { color: #ffe066; display: block; margin-bottom: 4px; }
  .tooltip .meta { color: #b8b8b8; font-size: 10px; margin-top: 4px; }
  .legend {
    max-width: 1800px;
    margin: 16px auto 0 auto;
    padding: 10px 16px;
    background: white;
    border: 1px solid var(--rule);
    border-radius: 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    font-size: 12px;
    color: var(--muted);
    justify-content: center;
  }
  .legend .item { display: inline-flex; align-items: center; gap: 6px; }
  .legend svg { display: inline-block; vertical-align: middle; }
  footer {
    max-width: 1800px;
    margin: 12px auto 0 auto;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
  }
</style>
</head>
<body>
<header>
  <h1>Litigation</h1>
  <p class="subtitle">Personal-injury timeline — medical treatment from injury (05/20/2011) through lawsuit filing (09/14/2012). Hover any marker for details.</p>
</header>

<div id="chart-wrap"></div>

<div class="legend">
  <span class="item"><svg width="14" height="14"><polygon points="7,2 12,12 2,12" fill="#d94e2a"/></svg> Dr. Smith</span>
  <span class="item"><svg width="14" height="14"><polygon points="7,2 12,12 2,12" fill="#8a2c1e"/></svg> Dr. Jones</span>
  <span class="item"><svg width="14" height="14"><polygon points="7,2 12,7 7,12 2,7" fill="#3a3a3a"/></svg> Evergreen</span>
  <span class="item"><svg width="14" height="14"><polygon points="7,2 12,7 7,12 2,7" fill="#ed8a3a"/></svg> Physical Therapy</span>
  <span class="item"><svg width="14" height="14"><path d="M3,2 L3,12 M3,2 L10,4 L3,6" stroke="#3a3a3a" stroke-width="1.5" fill="#3a3a3a"/></svg> Milestone</span>
</div>

<footer>Centered-axis variant · D3 · interactive · self-contained</footer>

<div class="tooltip" id="tooltip"></div>

<script>
// -------------------- DATA --------------------
const events = [
  { date: "2011-05-20", side: "above", category: "flag",      label: "SUFFERS INJURY",                                    shape: "flag",          dateText: "05/20/11", italicLabel: true, detail: "Injury occurs — start of medical timeline." },
  { date: "2011-06-14", side: "below", category: "evergreen", label: "EVERGREEN MRI",                                     shape: "diamond",       dateText: "06/14/11", detail: "Magnetic resonance imaging performed at Evergreen." },
  { date: "2011-07-19", side: "above", category: "smith",     label: "Dr. Smith First Office Visit",                      shape: "triangle-down", dateText: "07/19/11", detail: "Initial office consultation with Dr. Smith." },
  { date: "2011-08-12", side: "below", category: "smith",     label: "Dr. Smith Second Office Visit",                     shape: "triangle-up",   dateText: "08/12/11", detail: "Follow-up consultation with Dr. Smith." },
  { date: "2011-09-27", side: "below", category: "evergreen", label: "EVERGREEN Surgery",                                 shape: "diamond",       dateText: "09/27/11", detail: "Surgical procedure performed at Evergreen." },
  { date: "2011-10-03", side: "above", category: "evergreen", label: "EVERGREEN X-Ray / Cervical Collar",                 shape: "diamond",       dateText: "10/03/11", detail: "Post-operative imaging and cervical immobilization at Evergreen." },
  { date: "2011-11-05", side: "below", category: "smith",     label: "Dr. Smith First Post-Op Visit",                     shape: "triangle-up",   dateText: "11/05/11", detail: "First post-operative follow-up with Dr. Smith." },
  { date: "2011-11-28", side: "above", category: "evergreen", label: "EVERGREEN X-Ray",                                   shape: "diamond",       dateText: "11/28/11", detail: "Follow-up imaging at Evergreen." },
  { date: "2011-12-17", side: "below", category: "smith",     label: "Dr. Smith Second Post-Op Visit",                    shape: "triangle-up",   dateText: "12/17/11", detail: "Second post-operative follow-up with Dr. Smith." },
  { date: "2012-02-03", side: "below", category: "jones",     label: "Dr. Jones First Office Visit",                      shape: "triangle-up",   dateText: "02/03/12", detail: "Initial consultation with Dr. Jones." },
  { date: "2012-02-29", side: "above", category: "pt",        label: "PHYSICAL THERAPY Starts",                           shape: "diamond",       dateText: "02/29/12", detail: "Physical therapy program commenced." },
  { date: "2012-04-23", side: "below", category: "jones",     label: "Dr. Jones 2nd Office Visit — Referral Back to Dr. Smith", shape: "triangle-up", dateText: "04/23/12", detail: "Second visit with Dr. Jones; referral returned to Dr. Smith." },
  { date: "2012-05-03", side: "above", category: "smith",     label: "Dr. Smith Missed Appointment",                      shape: "triangle-down", dateText: "05/03/12", detail: "Patient missed scheduled appointment with Dr. Smith." },
  { date: "2012-07-03", side: "above", category: "jones",     label: "Dr. Jones Final Office Visit",                      shape: "triangle-down", dateText: "07/03/12", detail: "Final visit with Dr. Jones." },
  { date: "2012-08-03", side: "below", category: "pt",        label: "PHYSICAL THERAPY Ends",                             shape: "diamond",       dateText: "08/03/12", detail: "Physical therapy program concluded." },
  { date: "2012-09-14", side: "above", category: "flag",      label: "LAWSUIT FILED",                                     shape: "flag",          dateText: "09/14/12", italicLabel: true, detail: "Complaint filed — start of litigation phase." }
];

// -------------------- LAYOUT --------------------
const margin = { top: 60, right: 120, bottom: 60, left: 120 };
const width  = 1800;
const height = 900;

const xStart = new Date("2011-04-15");
const xEnd   = new Date("2012-09-30");
const x = d3.scaleTime().domain([xStart, xEnd]).range([margin.left, width - margin.right]);

const axisY = height / 2;

// -------------------- SVG --------------------
const svg = d3.select("#chart-wrap").append("svg")
  .attr("width", width)
  .attr("height", height)
  .attr("viewBox", `0 0 ${width} ${height}`)
  .attr("preserveAspectRatio", "xMidYMid meet");

// -------------------- THIN CENTERED AXIS --------------------
const axisX0 = x(new Date("2011-05-01"));
const axisX1 = x(new Date("2012-09-15"));

svg.append("line")
  .attr("class", "axis-line")
  .attr("x1", axisX0)
  .attr("x2", axisX1)
  .attr("y1", axisY)
  .attr("y2", axisY)
  .attr("stroke-linecap", "round");

// Year labels
svg.append("text")
  .attr("class", "year-label")
  .attr("x", axisX0 - 16)
  .attr("y", axisY)
  .attr("text-anchor", "end")
  .text("2011");

svg.append("text")
  .attr("class", "year-label")
  .attr("x", axisX1 + 16)
  .attr("y", axisY)
  .attr("text-anchor", "start")
  .text("2012");

// Month ticks + small labels just below the line
const months = d3.timeMonths(new Date("2011-05-01"), new Date("2012-10-01"));
months.forEach(m => {
  const cx = x(m);
  // small notch
  svg.append("line")
    .attr("class", "month-tick")
    .attr("x1", cx).attr("x2", cx)
    .attr("y1", axisY - 5)
    .attr("y2", axisY + 5);
});

// Labels: every-other-month, just under the line
months.filter((d, i) => i % 2 === 0).forEach(m => {
  const cx = x(m);
  const isJan = m.getMonth() === 0;
  svg.append("text")
    .attr("class", "month-label")
    .attr("x", cx)
    .attr("y", axisY + 22)
    .text(d3.timeFormat("%b")(m));
  if (isJan) {
    svg.append("text")
      .attr("class", "month-label")
      .attr("x", cx)
      .attr("y", axisY + 36)
      .style("font-size", "10.5px")
      .style("opacity", 0.8)
      .text(d3.timeFormat("%Y")(m));
  }
});

// -------------------- HELPERS --------------------
const tooltip = d3.select("#tooltip");

function colorFor(cat) {
  switch (cat) {
    case "smith":     return "#d94e2a";
    case "jones":     return "#8a2c1e";
    case "evergreen": return "#3a3a3a";
    case "pt":        return "#ed8a3a";
    case "flag":      return "#3a3a3a";
    default:          return "#999";
  }
}

function drawShape(g, e, s = 10) {
  const c = colorFor(e.category);
  if (e.shape === "triangle-up") {
    g.append("polygon").attr("class", "event-shape")
      .attr("points", `0,${-s} ${s},${s} ${-s},${s}`).attr("fill", c);
  } else if (e.shape === "triangle-down") {
    g.append("polygon").attr("class", "event-shape")
      .attr("points", `0,${s} ${s},${-s} ${-s},${-s}`).attr("fill", c);
  } else if (e.shape === "diamond") {
    const d = s - 1;
    g.append("polygon").attr("class", "event-shape")
      .attr("points", `0,${-d} ${d},0 0,${d} ${-d},0`).attr("fill", c);
  } else if (e.shape === "flag") {
    g.append("line").attr("class", "event-shape")
      .attr("x1", 0).attr("x2", 0).attr("y1", -18).attr("y2", 18)
      .attr("stroke", c).attr("stroke-width", 2);
    g.append("polygon").attr("class", "event-shape")
      .attr("points", "0,-18 14,-13 0,-8").attr("fill", c);
  }
}

// -------------------- ROW ASSIGNMENT (zigzag) --------------------
// Events on the same side alternate between TWO row heights (short stem and
// long stem), producing an up-and-down rhythm instead of a fan/cone.
// If two adjacent events end up too close horizontally, bump the later one
// to a third row so labels never overlap.
function assignRows(side) {
  const list = events.filter(e => e.side === side).sort((a, b) => new Date(a.date) - new Date(b.date));
  const lastXByRow = [-Infinity, -Infinity, -Infinity]; // up to 3 rows available per side
  const minGap = 150; // px of horizontal clearance required between events in the same row
  list.forEach((e, i) => {
    e._x = x(new Date(e.date));
    // First try the zigzag preference: row = i % 2
    let preferred = i % 2;
    if (e._x - lastXByRow[preferred] >= minGap) {
      e._row = preferred;
    } else {
      // Try the other zigzag row, then fallback row 2
      const other = preferred === 0 ? 1 : 0;
      if (e._x - lastXByRow[other] >= minGap) e._row = other;
      else e._row = 2;
    }
    lastXByRow[e._row] = e._x;
  });
}
assignRows("above");
assignRows("below");

// -------------------- DOTS ON AXIS --------------------
// Draw a small dot at each event's x position on the axis
events.forEach(e => {
  svg.append("circle")
    .attr("class", "event-dot")
    .attr("cx", e._x)
    .attr("cy", axisY)
    .attr("r", 5)
    .attr("fill", colorFor(e.category));
});

// -------------------- EVENTS --------------------
// Stem distances per row index (used in zigzag): row 0 = short, row 1 = long, row 2 = fallback longer
const rowStemDist = [55, 165, 270];

function wrap(text, maxLen) {
  const words = text.split(" ");
  const lines = [];
  let cur = "";
  for (const w of words) {
    if ((cur + " " + w).trim().length <= maxLen) cur = (cur + " " + w).trim();
    else { if (cur) lines.push(cur); cur = w; }
  }
  if (cur) lines.push(cur);
  return lines;
}

events.forEach(e => {
  const cx = e._x;
  const isAbove = e.side === "above";
  const dir = isAbove ? -1 : 1;

  // Stem goes from axis line out to the label block.
  // Row 0 = short stem (close to axis); row 1 = long stem (far from axis);
  // row 2 = fallback even farther. This creates the up-and-down zigzag rhythm.
  const stemLen = rowStemDist[e._row] || rowStemDist[rowStemDist.length - 1];
  const stemEndY = axisY + dir * stemLen;

  // Shape (marker) is drawn at the END of the stem (away from axis),
  // so the dot on the axis is the "anchor" and the shape labels the event.
  const shapeY = stemEndY;

  svg.append("line")
    .attr("class", "event-stem")
    .attr("x1", cx).attr("x2", cx)
    .attr("y1", axisY + dir * 6)
    .attr("y2", shapeY + dir * -8);

  const g = svg.append("g")
    .attr("class", "event-group")
    .attr("transform", `translate(${cx}, ${shapeY})`)
    .on("mouseover", () => {
      tooltip.style("opacity", 1)
        .html(`<strong>${e.label}</strong>${e.dateText}<div class="meta">${e.detail || ""}</div>`);
    })
    .on("mousemove", (ev) => {
      tooltip.style("left", (ev.pageX + 14) + "px")
             .style("top", (ev.pageY - 10) + "px");
    })
    .on("mouseout", () => tooltip.style("opacity", 0));

  drawShape(g, e);

  // Date text + label, placed beyond the marker (away from axis).
  const lineH = 14;
  const wrapped = wrap(e.label, 26);
  const baseY = shapeY + dir * 20; // start past marker
  if (isAbove) {
    // Above axis: label lines render upward (so first line is closest to marker)
    // Stack: date on top, then label lines under (i.e., date at baseY-... and label at baseY)
    // Actually: above the axis, baseY is moving UP. We want: marker → label → date (highest).
    const labelTopY = baseY - (wrapped.length - 1) * lineH;
    wrapped.forEach((line, i) => {
      svg.append("text")
        .attr("class", "event-label" + (e.italicLabel ? " italic" : ""))
        .attr("x", cx)
        .attr("y", labelTopY + i * lineH)
        .text(line);
    });
    svg.append("text")
      .attr("class", "event-date" + (e.category === "flag" ? " flag" : ""))
      .attr("x", cx)
      .attr("y", labelTopY - lineH - 2)
      .text(e.dateText);
  } else {
    // Below axis: marker → date → label
    svg.append("text")
      .attr("class", "event-date" + (e.category === "flag" ? " flag" : ""))
      .attr("x", cx)
      .attr("y", baseY)
      .text(e.dateText);
    wrapped.forEach((line, i) => {
      svg.append("text")
        .attr("class", "event-label" + (e.italicLabel ? " italic" : ""))
        .attr("x", cx)
        .attr("y", baseY + lineH * (i + 1) + 2)
        .text(line);
    });
  }
});
</script>
</body>
</html>
